services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hashedroute-api:local
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      HTTP_ADDR: ":8080"
      FABRIC_CRYPTO_PATH: /fabric/crypto
      FABRIC_KEY_DIR: /fabric/crypto/users/User1@org1.example.com/msp/keystore
      FABRIC_TLS_CA: /fabric/crypto/peers/peer0.org1.example.com/tls/ca.crt
      FABRIC_PEER_ENDPOINT: dns:///host.docker.internal:${FABRIC_HOST_PEER_PORT:-7051}
      FABRIC_GATEWAY_PEER: peer0.org1.example.com
      FABRIC_MSP_ID: Org1MSP
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE: delivery
      FABRIC_CONTRACT_NAME: DeliveryContract
    volumes:
      - type: bind
        source: ${FABRIC_CRYPTO_MOUNT:?Set FABRIC_CRYPTO_MOUNT to org1.example.com crypto dir — see Makefile help}
        target: /fabric/crypto
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hashedroute-web:local
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - api
    restart: unless-stopped

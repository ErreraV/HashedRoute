# App stack: three API + three web services (Org1–Org3). Edit ports or bind mounts here as needed.
# Peers run on the host via fabric-samples test-network; APIs use host.docker.internal + published gRPC ports.
services:
  api-org1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hashedroute-api:local
    ports:
      - "8081:8080"
    environment:
      HTTP_ADDR: ":8080"
      FABRIC_CRYPTO_PATH: /fabric/crypto
      FABRIC_KEY_DIR: /fabric/crypto/users/User1@org1.example.com/msp/keystore
      FABRIC_TLS_CA: /fabric/crypto/peers/peer0.org1.example.com/tls/ca.crt
      FABRIC_PEER_ENDPOINT: dns:///host.docker.internal:7051
      FABRIC_GATEWAY_PEER: peer0.org1.example.com
      FABRIC_MSP_ID: Org1MSP
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE: delivery
      FABRIC_CONTRACT_NAME: DeliveryContract
    volumes:
      - type: bind
        source: ${FABRIC_SAMPLES_ROOT}/test-network/organizations/peerOrganizations/org1.example.com
        target: /fabric/crypto
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web-org1:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hashedroute-web:local
    ports:
      - "8091:80"
    environment:
      NGINX_API_UPSTREAM: api-org1
    depends_on:
      - api-org1
    restart: unless-stopped

  api-org2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hashedroute-api:local
    ports:
      - "8082:8080"
    environment:
      HTTP_ADDR: ":8080"
      FABRIC_CRYPTO_PATH: /fabric/crypto
      FABRIC_KEY_DIR: /fabric/crypto/users/User1@org2.example.com/msp/keystore
      FABRIC_TLS_CA: /fabric/crypto/peers/peer0.org2.example.com/tls/ca.crt
      FABRIC_PEER_ENDPOINT: dns:///host.docker.internal:9051
      FABRIC_GATEWAY_PEER: peer0.org2.example.com
      FABRIC_MSP_ID: Org2MSP
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE: delivery
      FABRIC_CONTRACT_NAME: DeliveryContract
    volumes:
      - type: bind
        source: ${FABRIC_SAMPLES_ROOT}/test-network/organizations/peerOrganizations/org2.example.com
        target: /fabric/crypto
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web-org2:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hashedroute-web:local
    ports:
      - "8092:80"
    environment:
      NGINX_API_UPSTREAM: api-org2
    depends_on:
      - api-org2
    restart: unless-stopped

  api-org3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hashedroute-api:local
    ports:
      - "8083:8080"
    environment:
      HTTP_ADDR: ":8080"
      FABRIC_CRYPTO_PATH: /fabric/crypto
      FABRIC_KEY_DIR: /fabric/crypto/users/User1@org3.example.com/msp/keystore
      FABRIC_TLS_CA: /fabric/crypto/peers/peer0.org3.example.com/tls/ca.crt
      FABRIC_PEER_ENDPOINT: dns:///host.docker.internal:11051
      FABRIC_GATEWAY_PEER: peer0.org3.example.com
      FABRIC_MSP_ID: Org3MSP
      FABRIC_CHANNEL: mychannel
      FABRIC_CHAINCODE: delivery
      FABRIC_CONTRACT_NAME: DeliveryContract
    volumes:
      - type: bind
        source: ${FABRIC_SAMPLES_ROOT}/test-network/organizations/peerOrganizations/org3.example.com
        target: /fabric/crypto
        read_only: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web-org3:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hashedroute-web:local
    ports:
      - "8093:80"
    environment:
      NGINX_API_UPSTREAM: api-org3
    depends_on:
      - api-org3
    restart: unless-stopped
